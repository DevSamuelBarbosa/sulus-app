services:
  app:
    build:
      context: ./docker/php
    container_name: sulus-app
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sulus

  queue:
    build:
      context: ./docker/php
    container_name: sulus-queue
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --sleep=1
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sulus

  nginx:
    image: nginx:1.27-alpine
    container_name: sulus-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - sulus

  mysql:
    image: mysql:8.4
    container_name: sulus-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sulus}
      MYSQL_USER: ${DB_USERNAME:-sulus}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sulus

  redis:
    image: redis:7-alpine
    container_name: sulus-redis
    ports:
      - "6379:6379"
    networks:
      - sulus

  mailpit:
    image: axllent/mailpit:latest
    container_name: sulus-mailpit
    ports:
      - "8025:8025" # web UI — open http://localhost:8025 to read captured emails
      - "1025:1025" # SMTP — app sends here instead of a real mail server
    networks:
      - sulus

networks:
  sulus:
    driver: bridge

volumes:
  mysql-data:
